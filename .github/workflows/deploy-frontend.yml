name: Desplegar Frontend en Firebase Hosting

on:
  push:
    branches:
      - main
    paths:
      - 'frontend-gimnasio/**'

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependencias y compilar
        run: |
          cd frontend-gimnasio
          npm ci
          npm run build

      - name: Desplegar en Firebase Hosting
        uses: w9jds/firebase-action@v13.5.0
        with:
          args: deploy --only hosting
          PROJECT_ID: eastern-automata-txsl0
          PROJECT_PATH: ./frontend-gimnasio
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
